    <style>
        /* Series Pill Premium UI Token */
        .series-pill {
            display: inline-flex;
            align-items: center;
            padding: 0.625rem 1.375rem;

    <script>
        /**
         * ArchiveLayoutManager (Advanced Hub-and-Spoke Navigation & Sticky Console)
         * 實現正式環境三排分層全域控制列 (1.專題膠囊 2.分類與標籤 3.全域搜尋與排序)。
         * 遵守 Zero-Build 與無圖示規範。
         */
        (function() {
            class ArchiveLayoutManager {
                constructor() {
                    this.debug = false;
                    this.articles = [];
                    this.searchIndex = null;
                    this._loadingIndex = false;
                    this.state = {
                        category: 'all',
                        series: 'all',
                        tag: 'all',
                        search: '',
                        sort: 'published-desc'
                    };
                    this.selectors = {
                        seriesPills: '#series-pills-host',
                        categorySelect: '#categorySelect',
                        tagSelect: '#tagSelect',
                        searchInput: '#searchInput',
                        sortSelect: '#sortSelect',
                        statsCount: '#stats-count',
                        resetBtn: '#resetAllBtn',
                        grid: '.archive-grid',
                        noResults: '#no-results',
                        resetNoResultsBtn: '#reset-no-results-btn'
                    };
                }

                init() {
                    this.articles = window.ArticleRepository ? window.ArticleRepository.all : [];
                    if (this.debug) console.log("ArchiveManager Init: Found articles:", this.articles.length);

                    if (window.HeaderComponent) new HeaderComponent().init();
                    if (window.FooterComponent) new FooterComponent().init();

                    this._parseUrlParams();
                    if (this.state.search) {
                        this._loadSearchIndex();
                    }
                    this.renderAll();
                    this._bindEvents();
                    this._bindHeaderSearchIntercept();
                    this._initScrollProgress();
                    this._initRelatedArticles();

                    return this;
                }

                async _loadSearchIndex() {
                    if (this.searchIndex || this._loadingIndex) return;
                    this._loadingIndex = true;
                    
                    const statusTip = document.querySelector('#search-status-tip');
                    if (statusTip) {
                        statusTip.textContent = '正在加載全文索引以進行深度模糊檢索...';
                        statusTip.classList.remove('hidden');
                    }
                    
                    try {
                        const response = await fetch('../assets/js/search-index.json');
                        if (response.ok) {
                            this.searchIndex = await response.json();
                            if (this.debug) console.log("Search index loaded successfully:", this.searchIndex.length);
                            if (statusTip) {
                                statusTip.textContent = '⚡ 已啟用全站全文模糊搜尋';
                                setTimeout(() => {
                                    if (this.state.search) {
                                        statusTip.textContent = '⚡ 已啟用全站全文模糊搜尋';
                                    } else {
                                        statusTip.classList.add('hidden');
                                    }
                                }, 3000);
                            }
                            if (this.state.search) {
                                this.renderAll();
                            }
                        } else {
                            throw new Error(`HTTP ${response.status}`);
                        }
                    } catch (e) {
                        console.error("Failed to load search index:", e);
                        if (statusTip) {
                            statusTip.textContent = '⚠️ 無法載入全文索引，已降級為基本檢索';
                            setTimeout(() => statusTip.classList.add('hidden'), 5000);
                        }
                    } finally {
                        this._loadingIndex = false;
                    }
                }

                _parseUrlParams() {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('filter')) this.state.category = params.get('filter');
                    else if (params.get('category')) this.state.category = params.get('category');
                    
                    if (params.get('series')) this.state.series = params.get('series');
                    if (params.get('tag')) this.state.tag = params.get('tag');
                    if (params.get('q')) this.state.search = params.get('q');
                    if (params.get('sort')) this.state.sort = params.get('sort');

                    const inp = document.querySelector(this.selectors.searchInput);
                    if (inp && this.state.search) inp.value = this.state.search;

                    const srt = document.querySelector(this.selectors.sortSelect);
                    if (srt && this.state.sort) srt.value = this.state.sort;
                }

                updateUrlAndRender() {
                    const params = new URLSearchParams();
                    if (this.state.category !== 'all') params.set('filter', this.state.category);
                    if (this.state.series !== 'all') params.set('series', this.state.series);
                    if (this.state.tag !== 'all') params.set('tag', this.state.tag);
                    if (this.state.search) params.set('q', this.state.search);
                    if (this.state.sort !== 'published-desc') params.set('sort', this.state.sort);

                    const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
                    window.history.replaceState({ state: this.state }, '', newUrl);

                    this.renderAll();
                }

                renderAll() {
                    this._renderSeriesPills();
                    this._renderCategorySelect();
                    this._renderTagSelect();
                    this._filterAndRenderGrid();
                }

                // ── 1. 第一排：深度研究專題膠囊 (Series Pills) ──
                _renderSeriesPills() {
                    const host = document.querySelector(this.selectors.seriesPills);
                    if (!host) return;

                    const allSeries = (window.TaxonomyConfig && typeof window.TaxonomyConfig.getAllSeries === 'function') 
                        ? window.TaxonomyConfig.getAllSeries() 
                        : {};

                    let html = `<div class="series-pill ${this.state.series === 'all' ? 'active' : ''}" data-value="all" style="--series-color: #ea580c">全部專題</div>`;

                    Object.entries(allSeries).forEach(([id, info]) => {
                        html += `
                            <div class="series-pill ${this.state.series === id ? 'active' : ''}" data-value="${id}" style="--series-color: ${info.hex}">
                                ${info.text}
                            </div>
                        `;
                    });

                    host.innerHTML = html;
                    host.querySelectorAll('.series-pill').forEach(el => {
                        el.addEventListener('click', () => {
                            this.state.series = el.dataset.value;
                            this.state.category = 'all'; // 切換專題時重置大分類
                            this.state.tag = 'all'; // 重置子標籤
                            this.updateUrlAndRender();
                        });
                    });
                }

                // ── 2. 第二排左：文章大分類下拉 (Category Select) ──
                _renderCategorySelect() {
                    const select = document.querySelector(this.selectors.categorySelect);
                    if (!select) return;

                    const categories = (window.TaxonomyConfig && typeof window.TaxonomyConfig.getAllCategories === 'function')
                        ? window.TaxonomyConfig.getAllCategories()
                        : {};

                    let html = `<option value="all" ${this.state.category === 'all' ? 'selected' : ''}>-- 全部文章分類 --</option>`;

                    Object.entries(categories).forEach(([id, info]) => {
                        html += `<option value="${id}" ${this.state.category === id ? 'selected' : ''}>${info.text}</option>`;
                    });

                    select.innerHTML = html;
                }

                // ── 3. 第二排中：熱門研究主題標籤下拉 (Tag Select) ──
                _renderTagSelect() {
                    const select = document.querySelector(this.selectors.tagSelect);
                    if (!select) return;

                    const tagCounts = {};
                    this.articles.forEach(a => {
                        if (a.format === 'wiki') return; // 排除 wiki

                        const matchCat = this.state.category === 'all' || a.category === this.state.category;
                        const matchSeries = this.state.series === 'all' || a.series === this.state.series;

                        if (matchCat && matchSeries) {
                            const tagsList = a.tags && Array.isArray(a.tags) ? a.tags : (a.tag ? [a.tag] : []);
                            tagsList.forEach(t => {
                                tagCounts[t] = (tagCounts[t] || 0) + 1;
                            });
                        }
                    });

                    let html = `<option value="all" ${this.state.tag === 'all' ? 'selected' : ''}>-- 全部主題標籤 --</option>`;

                    Object.entries(tagCounts)
                        .sort((a, b) => b[1] - a[1])
                        .forEach(([tag, count]) => {
                            const tagInfo = window.TaxonomyConfig ? window.TaxonomyConfig.getTag(tag) : { text: tag };
                            html += `<option value="${tag}" ${this.state.tag === tag ? 'selected' : ''}>${tagInfo.text} (${count})</option>`;
                        });

                    select.innerHTML = html;
                }

                // ── 4. 滿版網格過濾與渲染 ──
                _filterAndRenderGrid() {
                    const { category, series, tag, search, sort } = this.state;

                    let matchedMap = new Map();
                    let hasSearch = false;

                    if (search) {
                        hasSearch = true;
                        const queryLower = search.toLowerCase();
                        const tokens = queryLower.split(/\s+/).filter(t => t);

                        if (tokens.length > 0) {
                            if (this.searchIndex && Array.isArray(this.searchIndex)) {
                                // 使用載入的全文檢索索引
                                this.searchIndex.forEach(item => {
                                    const textToSearch = (item.title + ' ' + item.desc + ' ' + (item.content || '')).toLowerCase();
                                    // AND 搜尋：必須包含所有 tokens
                                    const matchAll = tokens.every(t => textToSearch.includes(t));

                                    if (matchAll) {
                                        let score = 0;
                                        tokens.forEach(t => {
                                            // Title 匹配權重
                                            if (item.title.toLowerCase().includes(t)) {
                                                score += 100;
                                                if (item.title.toLowerCase() === t) score += 300;
                                            }
                                            // Description 匹配權重
                                            if (item.desc && item.desc.toLowerCase().includes(t)) {
                                                score += 40;
                                            }
                                            // Content 全文出現頻率權重
                                            if (item.content) {
                                                const contentLower = item.content.toLowerCase();
                                                let count = 0;
                                                let pos = contentLower.indexOf(t);
                                                while (pos !== -1) {
                                                    count++;
                                                    pos = contentLower.indexOf(t, pos + t.length);
                                                    if (count >= 20) break; // 上限避免過度計算
                                                }
                                                score += count * 5;
                                            }
                                        });
                                        matchedMap.set(item.id, score);
                                    }
                                });
                            } else {
                                // Fallback: 只搜尋 core-articles-data 中的 metadata (AND 匹配)
                                this.articles.forEach(a => {
                                    const textToSearch = (a.title + ' ' + a.desc + ' ' + (a.keywords || '')).toLowerCase();
                                    const matchAll = tokens.every(t => textToSearch.includes(t));
                                    if (matchAll) {
                                        matchedMap.set(a.id, 1); // 預設權重為 1
                                    }
                                });
                                // 觸發非同步載入全文索引
                                this._loadSearchIndex();
                            }
                        }
                    }

                    let filtered = this.articles.filter(a => {
                        const matchCat = category === 'all' ? a.format !== 'wiki' : a.category === category;
                        const matchSeries = series === 'all' || a.series === series;
                        const matchTag = tag === 'all' || (a.tags && a.tags.includes(tag)) || a.tag === tag;
                        const matchSearch = !hasSearch || matchedMap.has(a.id);
                        return matchCat && matchSeries && matchTag && matchSearch;
                    });

                    // 排序邏輯：若有搜尋關鍵字，且排序為「最新發布」(預設)，則依相關度 score 降序排列；score 相同或不使用相關度時依日期排列。
                    const [key, order] = sort.split('-');
                    filtered.sort((a, b) => {
                        if (hasSearch && sort === 'published-desc') {
                            const scoreA = matchedMap.get(a.id) || 0;
                            const scoreB = matchedMap.get(b.id) || 0;
                            if (scoreB !== scoreA) {
                                return scoreB - scoreA; // Score 高的排前面
                            }
                        }
                        const valA = new Date(a[key]);
                        const valB = new Date(b[key]);
                        return order === 'desc' ? valB - valA : valA - valB;
                    });

                    // 更新數量顯示
                    const statsCount = document.querySelector(this.selectors.statsCount);
                    if (statsCount) statsCount.textContent = filtered.length;

                    this._renderGrid(filtered);
                }

                _renderGrid(articles) {
                    const grid = document.querySelector(this.selectors.grid);
                    const noResults = document.querySelector(this.selectors.noResults);
                    if (!grid) return;

                    grid.innerHTML = articles.map(a => this._createCardHtml(a)).join('');
                    if (noResults) noResults.style.display = articles.length === 0 ? 'block' : 'none';
                }

                _createCardHtml(article) {
                    const taxonomy = window.TaxonomyConfig;
                    const tagsList = article.tags && Array.isArray(article.tags) ? article.tags : (article.tag ? [article.tag] : []);
                    const tagsHtml = tagsList.slice(0, 3).map(t => {
                        const tagInfo = taxonomy ? taxonomy.getTag(t) : { text: t, color: 'text-slate-500' };
                        return `<span class="text-[11px] font-bold ${tagInfo.color} uppercase tracking-widest px-3 py-1 border border-current rounded-full opacity-90">${tagInfo.text}</span>`;
                    }).join('');
                    
                    const seriesInfo = article.series && taxonomy ? taxonomy.getSeries(article.series) : null;
                    const isActiveSeries = this.state.series === article.series;

                    const isModified = article.modified && article.modified !== article.published;
                    const dateHtml = isModified
                        ? `<span class="text-[11px] text-slate-400 font-mono tracking-wide" title="發布於 ${article.published}">MODIFIED / ${article.modified}</span>`
                        : `<span class="text-[11px] text-slate-400 font-mono tracking-wide">PUBLISHED / ${article.published}</span>`;

                    return `
                        <div class="article-card flex flex-col theme-bg-card dark:bg-slate-850 rounded-3xl shadow-md hover:shadow-2xl border ${isActiveSeries ? 'border-orange-500/80 shadow-orange-500/10' : 'border-slate-200/80 dark:border-slate-800/80'} overflow-hidden transition-all duration-300 hover:-translate-y-1.5 group h-full">
                            <a href="../${article.link}" class="flex flex-col flex-1 p-8 sm:p-10">
                                <div class="flex flex-wrap items-center gap-3 mb-6">
                                    ${seriesInfo ? `
                                        <div class="flex items-center px-3 py-1 rounded-full theme-bg-body dark:bg-slate-900 border ${isActiveSeries ? 'border-orange-500' : 'border-slate-200 dark:border-slate-800'} transition-colors">
                                            <span class="text-[11px] font-bold ${isActiveSeries ? 'text-orange-600 dark:text-orange-500' : 'text-slate-700 dark:text-slate-300'} uppercase tracking-wider">${seriesInfo.text}</span>
                                        </div>
                                    ` : ''}
                                    ${tagsHtml}
                                    <div class="ml-auto">
                                        ${dateHtml}
                                    </div>
                                </div>
                                <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white group-hover:text-orange-600 transition-colors font-noto leading-snug mb-4">
                                    ${article.title}
                                </h2>
                                <p class="text-slate-600 dark:text-slate-400 text-sm sm:text-base leading-relaxed line-clamp-3 mb-8">
                                    ${article.desc || ''}
                                </p>
                                <div class="mt-auto pt-6 border-t border-slate-100 dark:border-slate-800 flex items-end justify-between gap-4">
                                    <div class="flex flex-col gap-3 min-w-0">
                                        <div class="flex flex-wrap gap-2">
                                            ${article.keywords ? article.keywords.split(',').slice(0, 5).map(k => `<span class="text-xs text-slate-500 dark:text-slate-400 theme-bg-body dark:bg-slate-900 px-2.5 py-1 rounded-lg border border-slate-100 dark:border-slate-800 font-medium">#${k.trim()}</span>`).join('') : ''}
                                        </div>
                                    </div>
                                    <span class="text-orange-600 text-xs font-bold uppercase tracking-widest group-hover:translate-x-1 transition-transform flex items-center gap-1 whitespace-nowrap shrink-0">
                                        Read Analysis →
                                    </span>
                                </div>
                            </a>
                        </div>
                    `;
                }

                // ── 事件綁定與重置邏輯 ──
                _bindEvents() {
                    const pageSearch = document.querySelector('#searchInput');
                    if (pageSearch) {
                        pageSearch.addEventListener('focus', () => this._loadSearchIndex());
                        pageSearch.addEventListener('mouseenter', () => this._loadSearchIndex());
                    }

                    document.addEventListener('input', (e) => {
                        if (e.target.id === 'searchInput') {
                            this.state.search = e.target.value.trim();
                            const headerHost = document.querySelector('#header-host');
                            if (headerHost && headerHost.shadowRoot) {
                                headerHost.shadowRoot.querySelectorAll('.header-search-input, .mobile-search-input').forEach(inp => inp.value = this.state.search);
                            }
                            this._loadSearchIndex();
                            this.updateUrlAndRender();
                        }
                    });

                    document.addEventListener('change', (e) => {
                        if (e.target.id === 'sortSelect') {
                            this.state.sort = e.target.value;
                            this.updateUrlAndRender();
                        } else if (e.target.id === 'categorySelect') {
                            this.state.category = e.target.value;
                            this.updateUrlAndRender();
                        } else if (e.target.id === 'tagSelect') {
                            this.state.tag = e.target.value;
                            this.updateUrlAndRender();
                        }
                    });

                    const resetBtn = document.querySelector(this.selectors.resetBtn);
                    if (resetBtn) resetBtn.addEventListener('click', () => this.resetAllFilters());

                    const resetNoRes = document.querySelector(this.selectors.resetNoResultsBtn);
                    if (resetNoRes) resetNoRes.addEventListener('click', () => this.resetAllFilters());

                    window.addEventListener('popstate', (e) => {
                        if (e.state && e.state.state) {
                            this.state = e.state.state;
                        } else {
                            this._parseUrlParams();
                        }
                        const pageSearch = document.querySelector('#searchInput');
                        if (pageSearch) pageSearch.value = this.state.search;
                        this.renderAll();
                    });
                }

                resetAllFilters() {
                    this.state.category = 'all';
                    this.state.series = 'all';
                    this.state.tag = 'all';
                    this.state.search = '';
                    this.state.sort = 'published-desc';

                    const pageSearch = document.querySelector('#searchInput');
                    if (pageSearch) pageSearch.value = '';

                    const headerHost = document.querySelector('#header-host');
                    if (headerHost && headerHost.shadowRoot) {
                        headerHost.shadowRoot.querySelectorAll('.header-search-input, .mobile-search-input').forEach(inp => inp.value = '');
                    }

                    const statusTip = document.querySelector('#search-status-tip');
                    if (statusTip) statusTip.classList.add('hidden');

                    this.updateUrlAndRender();
                }

                _bindHeaderSearchIntercept() {
                    const checkHeader = setInterval(() => {
                        const headerHost = document.querySelector('#header-host');
                        if (headerHost && headerHost.shadowRoot) {
                            const searchInputs = headerHost.shadowRoot.querySelectorAll('.header-search-input, .mobile-search-input');
                            if (searchInputs.length > 0) {
                                clearInterval(checkHeader);
                                searchInputs.forEach(input => {
                                    if (this.state.search) input.value = this.state.search;
                                    
                                    input.addEventListener('focus', () => this._loadSearchIndex());
                                    input.addEventListener('mouseenter', () => this._loadSearchIndex());
                                    
                                    input.addEventListener('input', (e) => {
                                        this.state.search = e.target.value.trim();
                                        const pageSearch = document.querySelector('#searchInput');
                                        if (pageSearch) pageSearch.value = this.state.search;
                                        this._loadSearchIndex();
                                        this.updateUrlAndRender();
                                    });

                                    input.addEventListener('keydown', (e) => {
                                        if (e.key === 'Enter') {
                                            e.preventDefault();
                                            e.stopPropagation();
                                        }
                                    });
                                });
                            }
                        }
                    }, 100);

                    setTimeout(() => clearInterval(checkHeader), 10000);
                }

                _initScrollProgress() {
                    const progressBar = document.getElementById('scroll-progress-bar');
                    window.addEventListener('scroll', () => {
                        const winScroll = document.documentElement.scrollTop;
                        const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                        const scrolled = (winScroll / height) * 100;
                        if (progressBar) progressBar.style.width = scrolled + '%';
                    }, { passive: true });
                }

                _initRelatedArticles() {
                    if (window.RelatedArticlesComponent) {
                        new RelatedArticlesComponent()
                            .setContainerId('related-articles-container')
                            .setLimit(3)
                            .init();
                    }
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                window.ArchiveManager = new ArchiveLayoutManager().init();
            });
        })();
    </script>
    <script src="../assets/js/widget-related-articles.js"></script>
</body>
