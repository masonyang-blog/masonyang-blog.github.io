<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知識資料庫 (Knowledge Database) | Mason Yang Blog</title>
    <meta name="description" content="Mason Yang Blog 知識資料庫：彙整加密貨幣領域的核心名詞、技術術語與關鍵概念，助您快速掌握產業脈絡。">
    <meta name="google-site-verification" content="F1sAja4V6KTk17SiojYOS8UF1GP9-hu8TXI8iVKQ27Y" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Theme Core (Must be first to prevent FOUC) -->
    <script src="../assets/js/core-theme.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#15202e', // Custom darker slate
                        }
                    }
                }
            }
        }
    </script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="../assets/css/custom.css">
    <style>
        .search-match {
            background-color: rgba(59, 130, 246, 0.08) !important;
            color: #2563eb !important; /* blue-600 */
        }
        .dark .search-match {
            background-color: rgba(59, 130, 246, 0.15) !important;
            color: #60a5fa !important; /* blue-400 */
        }
        .search-match span {
            background-color: #3b82f6 !important; /* blue-500 */
            height: 1.25rem !important;
        }
    </style>
</head>

    <!-- Scroll Progress Bar -->
    <div id="scroll-progress-container" class="fixed top-0 left-0 w-full h-0.5 bg-transparent z-[60]">
        <div id="scroll-progress-bar" class="h-full bg-blue-500 w-0 transition-all duration-150 ease-out"></div>
    </div>

    <!-- Header Host -->
    <div id="header-host"></div>

    <!-- MAIN: Three-Column Layout -->
    <main class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex flex-col lg:flex-row gap-8">

            <!-- ─────────────────────────────────────────
                 LEFT SIDEBAR: Navigation & Filter
            ───────────────────────────────────────── -->
            <aside class="hidden lg:block w-64 xl:w-72 shrink-0">
                <div class="sticky top-24 max-h-[calc(100vh-7rem)] overflow-y-auto pr-4 custom-scrollbar">
                    
                    <!-- Search -->
                    <div class="mb-8">
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 mb-4 px-1">
                            Search Engine</p>
                        <div class="relative group">
                            <svg class="absolute left-3.5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-blue-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                            <input type="text" id="left-search-input" 
                                class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl py-3 pl-10 pr-4 text-sm focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium"
                                placeholder="搜尋意圖、指標或標籤...">
                        </div>
                    </div>

                    <!-- Categories -->
                    <div class="mb-8">
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 mb-4 px-1">
                            百科分類導覽</p>
                        <nav id="knowledge-nav-host" class="space-y-1"></nav>
                    </div>
                    
                    <!-- Tag Cloud (Moved from right) -->
                    <div class="mb-8 p-1">
                        <p class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 dark:text-slate-500 mb-4">
                            熱門標籤</p>
                        <div class="flex flex-wrap gap-2" id="keyword-cloud-host">
                            <!-- JS Inject -->
                        </div>
                    </div>

                    <!-- Search Tips -->
                    <div class="pt-6 border-t border-slate-200 dark:border-slate-800">
                        <div class="bg-slate-50 dark:bg-slate-900/50 rounded-xl p-4 border border-slate-100 dark:border-slate-800">
                            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3">搜尋建議</p>
                            <div class="space-y-2">
                                <p class="text-[11px] text-slate-500 leading-relaxed">試著搜尋：<br>
                                    <span class="text-blue-600 dark:text-blue-400 cursor-pointer hover:underline" onclick="quickSearch('比特幣抄底')">#比特幣抄底</span>, 
                                    <span class="text-blue-600 dark:text-blue-400 cursor-pointer hover:underline" onclick="quickSearch('降息')">#降息</span>,
                                    <span class="text-blue-600 dark:text-blue-400 cursor-pointer hover:underline" onclick="quickSearch('S2F')">#S2F模型</span>
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ─────────────────────────────────────────
                 CENTER: Main Workstation Grid
            ───────────────────────────────────────── -->
            <div class="flex-1 min-w-0">
                
                <!-- Compact Header -->
                <header class="mb-10 px-2 lg:px-4">
                    <div class="flex items-center gap-4 mb-2">
                        <span class="px-2 py-0.5 bg-blue-500 text-[10px] font-black text-white rounded uppercase tracking-widest">Database v1.2</span>
                        <div class="h-px flex-1 bg-slate-100 dark:bg-slate-800"></div>
                    </div>
                    <h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-4 tracking-tighter">
                        Knowledge Hub
                    </h1>
                    <p class="text-slate-500 dark:text-slate-400 text-lg max-w-2xl leading-relaxed">
                        原子化知識工作站：碎片化整合加密貨幣核心概念與鏈上指標。
                    </p>
                </header>

                <!-- Knowledge Component Host -->
                <div id="knowledge-base-host" class="knowledge-hub-headless"></div>

                <div id="toc-mobile-target" class="hidden"></div>
                <div id="related-articles-container" class="hidden"></div>
            </div>

            <!-- ─────────────────────────────────────────
                 RIGHT SIDEBAR: Personal Workspace & AI
            ───────────────────────────────────────── -->
            <aside class="hidden xl:block w-72 xl:w-80 shrink-0">
                <div class="sticky top-24 max-h-[calc(100vh-7rem)] overflow-y-auto pr-4 custom-scrollbar space-y-6">
                    
                    <!-- AI Insight Panel -->
                    <div class="bg-slate-900 dark:bg-black rounded-2xl p-6 text-white border border-slate-800 shadow-2xl">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-lg">🤖</span>
                            <h4 class="text-sm font-black uppercase tracking-widest">AI Workspace</h4>
                        </div>
                        <div class="space-y-4">
                            <div class="p-3 bg-white/5 rounded-xl border border-white/10">
                                <p class="text-[11px] text-slate-400 mb-1 leading-none">當前掃描重點</p>
                                <p class="text-xs text-slate-200">請選取左側卡片來獲取深度 AI 摘要與實戰策略建議。</p>
                            </div>
                        </div>
                    </div>

                    <!-- Personal Notebook (Notebook Window) -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden flex flex-col h-[500px]">
                        <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/50 flex justify-between items-center">
                            <p class="text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500">我的研究筆記</p>
                            <span class="text-[10px] font-mono text-slate-400">0 Items</span>
                        </div>
                        <div class="flex-1 p-5 overflow-y-auto custom-scrollbar">
                            <div id="notebook-empty-state" class="h-full flex flex-col items-center justify-center text-center space-y-3 opacity-40">
                                <span class="text-3xl">📝</span>
                                <p class="text-xs font-medium text-slate-500 leading-relaxed">點擊卡片上的「存入收納盒」<br>來構建您的研究報告。</p>
                            </div>
                            <div id="notebook-items-host" class="space-y-3 hidden">
                                <!-- Note items will go here -->
                            </div>
                        </div>
                        <div class="p-4 border-t border-slate-100 dark:border-slate-700 bg-slate-50/30 space-y-3">
                            <button onclick="exportNotebook()" class="w-full py-2.5 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-xl text-xs font-bold hover:opacity-90 transition-opacity">匯出研究報告</button>
                            <button onclick="clearNotebook()" class="w-full py-1 text-[10px] text-slate-400 font-bold hover:text-red-500 transition-colors">清空收納盒</button>
                        </div>
                    </div>

                    <!-- Quick Links (Recommended) -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
                        <p class="text-xs font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 mb-4">關聯文章</p>
                        <div id="recommended-articles-host" class="space-y-4">
                            <!-- JS Inject -->
                        </div>
                    </div>
                </div>
            </aside>

        </div>
    </main>

    <!-- Footer Host -->
    <div id="footer-host"></div>

    <!-- Backdrop for Mobile (Not strictly needed for this layout but good to have) -->
    <div id="nav-backdrop" class="fixed inset-0 bg-slate-900/50 z-40 hidden backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>

    <!-- Components & Data -->
    <script src="../assets/js/core-header.js"></script>
    <script src="../assets/js/core-footer.js"></script>
    <script src="../assets/js/app-knowledge-data.js"></script>
    <script src="../assets/js/core-articles-data.js"></script>
    <script src="../assets/js/app-knowledge-core.js"></script>
    <script src="../assets/js/ui-toc-responsive.js"></script>
    <script src="../assets/js/ui-toc-desktop.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 1. Core Init
            new HeaderComponent().init();
            new FooterComponent().init();

            // 2. Knowledge Hub Init (Headless Mode)
            const knowledgeRepo = window.CoreKnowledgeRepository;
            const knowledgeComp = new CoreKnowledgeComponent('knowledge-base-host');
            if (knowledgeRepo) {
                knowledgeComp
                    .setShowSearch(false)
                    .setFrameless(true)
                    .setDebug(false)
                    .init();
            }

            // 3. Sync Left Search with Center Component
            const leftSearch = document.getElementById('left-search-input');
            if (leftSearch) {
                leftSearch.addEventListener('input', (e) => {
                    knowledgeComp.setSearchTerm(e.target.value);
                });
            }

            // 4. Render Custom Navigation (Left Sidebar)
            renderKnowledgeNav(knowledgeRepo);

            // 5. Render Recommended Articles (Right Sidebar)
            renderRecommendedArticles();

            // 6. Keyword Cloud (Right Sidebar)
            renderKeywordCloud();

            // 8. Notebook Integration
            window.addEventListener('notebook-updated', (e) => {
                renderNotebook(e.detail);
            });

            // 9. AI Insight Workspace Integration
            window.addEventListener('knowledge-card-selected', (e) => {
                updateAiInsight(e.detail);
            });

            // Initial notebook render
            const initialNotebook = JSON.parse(localStorage.getItem('knowledge_notebook') || '[]');
            renderNotebook(initialNotebook);

            // Phase 3.5: Listen for search results to highlight categories
            window.addEventListener('knowledge-search-results', (e) => {
                const { searchTerm, matchedCategories } = e.detail;
                const navButtons = document.querySelectorAll('#knowledge-nav-host button[data-cat-id]');
                
                navButtons.forEach(btn => {
                    const catId = btn.getAttribute('data-cat-id');
                    const hasMatch = searchTerm && matchedCategories.includes(catId);
                    
                    if (hasMatch) {
                        btn.classList.add('search-match');
                    } else {
                        btn.classList.remove('search-match');
                    }
                });
            });
        });

        function updateAiInsight(item) {
            const panel = document.querySelector('.bg-slate-900.dark\:bg-black .space-y-4');
            if (!panel) return;

            // Generate a mock strategy based on item category
            let strategy = '';
            if (item.category === 'macro' || item.category === 'valuation') {
                strategy = '建議配置：長線持有。結合 2-Year MA 模型在綠色區間分批進場，避免在短期情緒過熱時追高。';
            } else if (item.category === 'onchain') {
                strategy = '實戰信號：當指標進入極端區間（如 Z-Score > 7）時需警惕派發風險，反之則是左側佈局機會。';
            } else {
                strategy = '核心意圖：理解此概念的技術邊界，與 Layer 2 生態或 DeFi 協議進行跨域聯動研究。';
            }

            panel.innerHTML = `
                <div class="p-4 bg-blue-500/10 rounded-xl border border-blue-500/20 animate-in fade-in slide-in-from-right-4 duration-500">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-2">Live Insight: ${item.title}</p>
                    <p class="text-xs text-slate-100 leading-relaxed mb-4">${item.importance}</p>
                    <div class="pt-4 border-t border-white/10">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">實戰應用策略</p>
                        <p class="text-xs text-slate-300 italic">"${strategy}"</p>
                    </div>
                </div>
            `;
        }

        function quickSearch(term) {
            const input = document.getElementById('left-search-input');
            if (input && window.activeKnowledgeComponent) {
                input.value = term;
                window.activeKnowledgeComponent.setSearchTerm(term);
                input.focus();
            }
        }

        function renderKnowledgeNav(repo) {
            const host = document.getElementById('knowledge-nav-host');
            if (!host || !repo) return;
            const categories = repo.categories;
            let html = '';
            Object.entries(categories).forEach(([id, label]) => {
                html += `
                    <button class="w-full text-left px-3 py-2 rounded-xl text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 hover:text-blue-600 dark:hover:text-blue-400 hover:shadow-sm dark:hover:shadow-none transition-all flex items-center gap-3 group" 
                        data-cat-id="${id}"
                        onclick="scrollToCategory('${id}')">
                        <span class="w-1 h-4 rounded-full bg-slate-200 dark:bg-slate-800 group-hover:bg-blue-500 transition-colors"></span>
                        ${label}
                    </button>
                `;
            });
            host.innerHTML = html;
        }

        function scrollToCategory(catId) {
            if (window.activeKnowledgeComponent) {
                const input = document.getElementById('left-search-input');
                const currentSearch = input ? input.value : '';
                
                // If there's a search term, we should just scroll to the section within the filtered results
                // and NOT clear the search. Clearing search should be a conscious user action.
                
                // 2. Wait for next frame to ensure DOM is ready
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        window.activeKnowledgeComponent.scrollToCategory(catId);
                    });
                });
            }
        }

        function renderRecommendedArticles() {
            const host = document.getElementById('recommended-articles-host');
            if (!host || !window.ArticleRepository) return;
            const coreArticles = window.ArticleRepository.all.filter(a => a.category === 'core').slice(0, 4);
            let html = '';
            coreArticles.forEach(a => {
                html += `
                    <a href="../${a.link}" class="block group">
                        <p class="text-[10px] font-black text-blue-500 uppercase mb-1 tracking-tighter">${a.tag}</p>
                        <h5 class="text-xs font-bold text-slate-800 dark:text-slate-200 group-hover:text-blue-600 transition-colors leading-relaxed">${a.title}</h5>
                    </a>
                `;
            });
            host.innerHTML = html;
        }

        function renderKeywordCloud() {
            const host = document.getElementById('keyword-cloud-host');
            if (!host) return;
            const keywords = ['比特幣抄底', '通膨路徑', '減半週期', 'MVRV Z-Score', 'S2F 模型', '代幣化', 'DeFi 基石', '美元貶值'];
            let html = '';
            keywords.forEach(k => {
                html += `
                    <span class="px-3 py-1 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-400 rounded-full text-[10px] font-bold border border-slate-100 dark:border-slate-800 hover:bg-blue-50 dark:hover:bg-blue-900/30 hover:text-blue-600 hover:border-blue-200 transition-all cursor-pointer" onclick="quickSearch('${k}')">
                        #${k}
                    </span>
                `;
            });
            host.innerHTML = html;
        }

        function renderNotebook(items) {
            const host = document.getElementById('notebook-items-host');
            const emptyState = document.getElementById('notebook-empty-state');
            const countLabel = document.querySelector('.font-mono.text-slate-400');
            
            if (!host || !emptyState) return;

            if (items.length === 0) {
                host.classList.add('hidden');
                emptyState.classList.remove('hidden');
                if (countLabel) countLabel.textContent = '0 Items';
                return;
            }

            emptyState.classList.add('hidden');
            host.classList.remove('hidden');
            if (countLabel) countLabel.textContent = `${items.length} Items`;

            host.innerHTML = items.map(item => `
                <div class="p-3 bg-slate-50 dark:bg-slate-900/50 border border-slate-100 dark:border-slate-800 rounded-xl flex justify-between items-center group">
                    <div class="min-w-0">
                        <p class="text-[10px] uppercase font-bold text-slate-400 mb-0.5">${item.category}</p>
                        <h6 class="text-xs font-bold text-slate-800 dark:text-slate-200 truncate">${item.title}</h6>
                    </div>
                    <button class="text-slate-400 hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100" onclick="removeFromNotebook('${item.id}')">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>
            `).join('');
        }

        function removeFromNotebook(id) {
            let notebook = JSON.parse(localStorage.getItem('knowledge_notebook') || '[]');
            notebook = notebook.filter(n => n.id !== id);
            localStorage.setItem('knowledge_notebook', JSON.stringify(notebook));
            renderNotebook(notebook);
        }

        function exportNotebook() {
            const notebook = JSON.parse(localStorage.getItem('knowledge_notebook') || '[]');
            if (notebook.length === 0) {
                alert('收納盒是空的');
                return;
            }

            const text = "Mason Yang Blog 研究報告摘要\n" + 
                         "==========================\n\n" + 
                         notebook.map((n, i) => `${i+1}. ${n.title} (${n.category})`).join('\n') + 
                         "\n\n匯出時間: " + new Date().toLocaleString();

            navigator.clipboard.writeText(text).then(() => {
                alert('報告內容已複製到剪貼簿！');
            });
        }

        function clearNotebook() {
            if (confirm('確定要清空研究收納盒嗎？')) {
                localStorage.removeItem('knowledge_notebook');
                renderNotebook([]);
            }
        }

    </script>

</body>
</html>
